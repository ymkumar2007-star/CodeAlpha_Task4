<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>

    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="music-player">

    <h1>🎵 Music Player</h1>

    <!-- Album Image -->
    <div class="cover">
        <img id="cover" src="images/song1.jpg" alt="Album Cover">
    </div>

    <!-- Song Details -->
    <div class="song-info">
        <h2 id="title">Song Title</h2>
        <p id="artist">Artist Name</p>
    </div>

    <!-- Audio -->
    <audio id="audio"></audio>

    <!-- Progress -->
    <div class="progress-container">

        <span id="current-time">0:00</span>

        <input
            type="range"
            id="progress"
            value="0"
            min="0"
            max="100">

        <span id="duration">0:00</span>

    </div>

    <!-- Controls -->
    <div class="controls">

        <button id="prev">
            <i class="fas fa-backward"></i>
        </button>

        <button id="play">
            <i class="fas fa-play"></i>
        </button>

        <button id="next">
            <i class="fas fa-forward"></i>
        </button>

    </div>

    <!-- Volume -->
    <div class="volume">

        <i class="fas fa-volume-up"></i>

        <input
            type="range"
            id="volume"
            min="0"
            max="1"
            step="0.01"
            value="1">

    </div>

    <!-- Playlist -->
    <div class="playlist">

        <h3>Playlist</h3>

        <ul id="playlist">

            <li data-index="0">🎵 Song One</li>
            <li data-index="1">🎵 Song Two</li>
            <li data-index="2">🎵 Song Three</li>

        </ul>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
